<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MEV Navigator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1525;
      color: #e2e8f0;
      width: 260px;
      padding: 1rem;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .monogram {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #1a3a5c, #0d2a4a);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #c9a84c;
      font-weight: 800;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .title { font-size: 0.82rem; font-weight: 700; line-height: 1.2; }
    .sub { font-size: 0.68rem; color: #c9a84c; text-transform: uppercase; letter-spacing: 0.06em; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.6rem 1rem;
      background: linear-gradient(135deg, #1a3a5c, #0f2a45);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 6px;
      color: #c9a84c;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: linear-gradient(135deg, #1e4470, #132e50); }
    .hint {
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: #4a6a8a;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="monogram">ALP</div>
    <div>
      <div class="title">Alcance Legal Penal</div>
      <div class="sub">MEV Navigator</div>
    </div>
  </div>
  <button class="btn" id="btn-open">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <line x1="9" y1="3" x2="9" y2="21"/>
    </svg>
    Abrir panel de análisis
  </button>
  <p class="hint">Abrí el panel, navegá al MEV y analizá la causa con IA.</p>
  <script src="popup.js"></script>
</body>
</html>
